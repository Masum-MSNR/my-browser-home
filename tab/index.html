<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Chrome Tab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/clock.css" />
    <link rel="stylesheet" href="styles/search.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/todo.css" />
    <link rel="stylesheet" href="styles/mail.css" />
    <link rel="stylesheet" href="styles/shortcuts.css" />
    <link rel="stylesheet" href="styles/modal.css" />
</head>

<body>
    <div class="container">

        <!-- Time Display -->
        <div class="time-container">
            <div class="digital-display">
                <div class="time" id="time">12<span class="colon">:</span>48 PM</div>
                <div class="date" id="date">FRI • JUL 25 • 2025</div>
            </div>
        </div>
        <!-- Google Search Box -->
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" class="search-box" placeholder="Search Google..." id="searchInput"
                    autocomplete="off">
                <button class="search-btn" onclick="performSearch()">⌕</button>
            </div>
        </div>

        <!-- Responsive 3-Block Layout -->
        <div class="block-layout">
            <div class="block block-left">
                <div class="todo-wrapper">
                    <ul id="todo-list"></ul>
                </div>

            </div>
            <div class="block block-middle">
                <div class="shortcuts-wrapper">
                    <div id="shortcut-grid" class="shortcut-grid"></div>
                </div>
            </div>
            <div class="block block-right">
                <div class="mail-wrapper">
                    <ul id="mail-list"></ul>
                </div>
            </div>
        </div>

    </div>
    <div id="todo-dialog" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="close-todo-dialog">&times;</button>
            <h4>Add New Task</h4>
            <form id="todo-form" class="my-form">
                <input type="text" id="todo-input" placeholder="Enter your task..." />
                <button type="submit">Add</button>
            </form>
        </div>
    </div>

    <div id="shortcut-dialog" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="close-shortcut-dialog">&times;</button>
            <h4 id="shortcut-dialog-title">Add Shortcut</h4>
            <form id="shortcut-form" class="my-form">
                <input type="url" id="shortcut-url" placeholder="https://example.com" required />
                <div class="name-input-wrapper">
                    <input type="text" id="shortcut-name" placeholder="Shortcut Name" required />
                    <button type="button" id="sync-name-btn" title="Sync name from URL">⟳</button>
                </div>
                <button type="submit">Save</button>
            </form>
        </div>
    </div>


    <div id="mail-dialog" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="close-mail-dialog">&times;</button>
            <h4>Add Mail Shortcut</h4>
            <form id="mail-form" class="my-form">
                <input type="text" id="mail-id" placeholder="Enter name or ID..." />
                <input type="email" id="mail-email" placeholder="Enter Gmail..." />
                <button type="submit">Add</button>
            </form>
        </div>
    </div>


    <script src="scripts/clock.js"></script>
    <script src="scripts/search.js"></script>
    <script src="scripts/todo.js"></script>
    <script src="scripts/mail.js"></script>
    <script src="scripts/shortcuts.js" type="module"></script>
    <script src="./utils.js"></script>
</body>

</html>
