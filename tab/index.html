<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Chrome Tab</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/clock.css" />
    <link rel="stylesheet" href="styles/search.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/mail.css" />
    <link rel="stylesheet" href="styles/shortcuts.css" />
    <link rel="stylesheet" href="styles/modal.css" />
    <link rel="stylesheet" href="styles/theme.css" />
    <link rel="stylesheet" href="styles/bookmarks.css" />
</head>

<body>
    <!-- Bookmark Bar -->
    <div id="bookmark-bar">
        <div id="bookmark-bar-items" class="bookmark-bar-items"></div>
    </div>

    <div class="container">
        <!-- Bookmark button (top left) -->
        <div id="bookmark-corner" class="bookmark-corner">
            <button id="bookmark-btn" class="corner-btn" title="Bookmarks">
                <i class="fas fa-bookmark"></i>
            </button>
            <div id="bookmark-dropdown" class="sync-dropdown">
                <div id="bookmark-dropdown-content"></div>
            </div>
        </div>

        <!-- Sync + Mail buttons (top right) -->
        <div id="sync-corner" class="sync-corner">
            <button id="sync-btn" class="corner-btn corner-btn-sync" title="Sync">
                <i class="fas fa-cloud"></i>
            </button>
            <div id="sync-dropdown" class="sync-dropdown">
                <div id="sync-dropdown-content"></div>
            </div>
        </div>
        <div id="mail-corner" class="mail-corner">
            <button id="mail-dropdown-btn" class="corner-btn" title="Mail">
                <i class="fas fa-envelope"></i>
            </button>
            <div id="mail-dropdown" class="mail-dropdown">
                <div class="mail-dropdown-header">
                    <h4>Google Accounts</h4>
                </div>
                <ul id="mail-dropdown-list"></ul>
            </div>
        </div>

        <!-- Theme button (bottom right) -->
        <button id="open-theme-panel" class="corner-btn corner-btn-theme" title="Change Theme">
            <i class="fas fa-palette"></i>
        </button>

        <!-- Theme Panel -->
        <div id="theme-panel" class="theme-panel">
            <div class="theme-panel-header">
                <h3>Select a Theme</h3>
                <button class="close-theme-panel" title="Close Panel">&times;</button>
            </div>
            <div class="theme-options" id="theme-options"></div>
        </div>

        <!-- Clock -->
        <div class="time-container">
            <div class="digital-display">
                <div class="time" id="time">12<span class="colon">:</span>48 PM</div>
                <div class="date" id="date">THU • AUG 07 • 2025</div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" class="search-box" placeholder="Search Google..." id="searchInput"
                    autocomplete="off">
                <button class="search-btn" onclick="performSearch()">⌕</button>
            </div>
        </div>

        <!-- Shortcuts -->
        <div class="shortcuts-wrapper">
            <div id="shortcut-grid" class="shortcut-grid"></div>
        </div>

    </div>

    <!-- Shortcut Modal -->
    <div id="shortcut-dialog" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="close-shortcut-dialog">&times;</button>
            <h4 id="shortcut-dialog-title">Add Shortcut</h4>
            <form id="shortcut-form" class="my-form">
                <input type="url" id="shortcut-url" placeholder="https://example.com" required />
                <div class="name-input-wrapper">
                    <input type="text" id="shortcut-name" placeholder="Shortcut Name" required />
                    <button type="button" id="sync-name-btn" title="Sync name from URL">⟳</button>
                </div>
                <button type="submit">Save</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./vendor/firebase/firebase-app-compat.js"></script>
    <script src="./vendor/firebase/firebase-auth-compat.js"></script>
    <script src="./vendor/firebase/firebase-firestore-compat.js"></script>
    <script src="./sync.js"></script>
    <script src="./storage.js"></script>
    <script src="scripts/clock.js"></script>
    <script src="scripts/search.js"></script>
    <script src="scripts/mail.js"></script>
    <script src="./utils.js"></script>
    <script src="scripts/shortcuts.js"></script>
    <script src="scripts/theme.js"></script>
    <script src="scripts/bookmarks.js"></script>
</body>

</html>
