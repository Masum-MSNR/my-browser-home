<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container">

        <!-- Time Display -->
        <div class="time-container">
            <div class="digital-display">
                <div class="time" id="time">12<span class="colon">:</span>48 PM</div>
                <div class="date" id="date">FRI • JUL 25 • 2025</div>
            </div>
        </div>
        <!-- Google Search Box -->
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" class="search-box" placeholder="Search Google..." id="searchInput"
                    autocomplete="off">
                <button class="search-btn" onclick="performSearch()">⌕</button>
            </div>
        </div>

        <!-- Responsive 3-Block Layout -->
        <div class="block-layout">
            <div class="block block-left">
                <div class="todo-wrapper">
                    <div class="todo-header">
                        <h3>My Tasks</h3>
                        <button id="open-dialog" title="Add Task">+</button>
                    </div>
                    <ul id="todo-list"></ul>
                </div>

            </div>
            <div class="block block-middle">Middle Block</div>
            <div class="block block-right">
                <div class="mail-wrapper">
                    <div class="mail-header">
                        <h3>Mail Shortcuts</h3>
                        <button id="open-mail-dialog" title="Add Mail">+</button>
                    </div>
                    <ul id="mail-list"></ul>
                </div>
            </div>
        </div>

    </div>
    <div id="todo-dialog" class="modal">
        <div class="modal-content">
            <h4>Add New Task</h4>
            <form id="todo-form" class="my-form">
                <input type="text" id="todo-input" placeholder="Enter your task..." />
                <button type="submit">Add</button>
            </form>
        </div>
    </div>
    <div id="mail-dialog" class="modal">
        <div class="modal-content">
            <h4>Add Mail Shortcut</h4>
            <form id="mail-form" class="my-form"> <!-- use the same class -->
                <input type="text" id="mail-id" placeholder="Enter name or ID..." />
                <input type="email" id="mail-email" placeholder="Enter Gmail..." />
                <button type="submit">Add</button>
            </form>
        </div>
    </div>

    <script src="scripts/main.js"></script>
</body>

</html>
